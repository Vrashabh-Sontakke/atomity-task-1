# WireGuard ran fine under 2 gb memory, didn't test the lower limit btw
services:
  wg-portal:
    image: wgportal/wg-portal:v2
    container_name: wg-portal
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    ports:
      - "51820:51820/udp"
      - "8888:8888/tcp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    volumes:
      - ./data:/app/data
      - ./config:/app/config